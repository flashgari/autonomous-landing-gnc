<text x="53" y="1020.0" font-family="Arial" font-size="11" fill="#64748b">1e-5</text>
<text x="53" y="965.0" font-family="Arial" font-size="11" fill="#64748b">1e-3</text>
<text x="53" y="910.0" font-family="Arial" font-size="11" fill="#64748b">1e-1</text>
<text x="53" y="855.0" font-family="Arial" font-size="11" fill="#64748b">1e1</text>
<text x="1010" y="132" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">What becomes active</text>
<text x="1010" y="171" font-family="Arial" font-size="14" font-weight="400" fill="#334155">The glide-slope margin approaches zero during</text>
<text x="1010" y="192" font-family="Arial" font-size="14" font-weight="400" fill="#334155">the large divert. That means terrain-relative</text>
<text x="1010" y="213" font-family="Arial" font-size="14" font-weight="400" fill="#334155">geometry, rather than thrust or tilt, is the</text>
<text x="1010" y="234" font-family="Arial" font-size="14" font-weight="400" fill="#334155">binding high-altitude path constraint.</text>
<text x="1010" y="255" font-family="Arial" font-size="14" font-weight="400" fill="#334155"></text>
<text x="1010" y="276" font-family="Arial" font-size="14" font-weight="400" fill="#334155">Tilt and thrust margins remain positive, so</text>
<text x="1010" y="297" font-family="Arial" font-size="14" font-weight="400" fill="#334155">the 48 m case is not won by saturating control.</text>
<text x="1010" y="318" font-family="Arial" font-size="14" font-weight="400" fill="#334155">It is won by distributing lateral acceleration</text>
<text x="1010" y="339" font-family="Arial" font-size="14" font-weight="400" fill="#334155">over the available time-to-go.</text>
<text x="1010" y="415" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Terminal handoff</text>
<text x="1010" y="454" font-family="Arial" font-size="14" font-weight="400" fill="#334155">The handoff occurs at t = 12.9 s when</text>
<text x="1010" y="475" font-family="Arial" font-size="14" font-weight="400" fill="#334155">the estimated altitude crosses 160 m. Below</text>
<text x="1010" y="496" font-family="Arial" font-size="14" font-weight="400" fill="#334155">that point, actuator lag and minimum-throttle</text>
<text x="1010" y="517" font-family="Arial" font-size="14" font-weight="400" fill="#334155">switching matter more than long-horizon path</text>
<text x="1010" y="538" font-family="Arial" font-size="14" font-weight="400" fill="#334155">shaping, so the verified terminal corridor</text>
<text x="1010" y="559" font-family="Arial" font-size="14" font-weight="400" fill="#334155">controller completes braking and touchdown.</text>
<text x="1010" y="650" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Solver interpretation</text>
<text x="1010" y="689" font-family="Arial" font-size="14" font-weight="400" fill="#334155">ADMM separates the quadratic objective from</text>
<text x="1010" y="710" font-family="Arial" font-size="14" font-weight="400" fill="#334155">projection onto linear constraint intervals.</text>
<text x="1010" y="731" font-family="Arial" font-size="14" font-weight="400" fill="#334155">A feasible iterate can be accepted before the</text>
<text x="1010" y="752" font-family="Arial" font-size="14" font-weight="400" fill="#334155">dual residual reaches the tighter optimality</text>
<text x="1010" y="773" font-family="Arial" font-size="14" font-weight="400" fill="#334155">tolerance; feasibility and convergence are</text>
<text x="1010" y="794" font-family="Arial" font-size="14" font-weight="400" fill="#334155">therefore reported as separate quantities.</text>
<text x="1010" y="815" font-family="Arial" font-size="14" font-weight="400" fill="#334155"></text>
<text x="1010" y="836" font-family="Arial" font-size="14" font-weight="400" fill="#334155">This divert lands at +2.71 m</text>
<text x="1010" y="857" font-family="Arial" font-size="14" font-weight="400" fill="#334155">with speed 0.94 m/s.</text>
<text x="1010" y="878" font-family="Arial" font-size="14" font-weight="400" fill="#334155">The worst QP violation is retained in the data</text>
<text x="1010" y="899" font-family="Arial" font-size="14" font-weight="400" fill="#334155">rather than hidden by the plotting layer.</text>
<text x="1010" y="960" font-family="Arial" font-size="20" font-weight="700" fill="#0f172a">Model boundary</text>
<text x="1010" y="999" font-family="Arial" font-size="14" font-weight="400" fill="#334155">This is a planar convex relaxation with a</text>
<text x="1010" y="1020" font-family="Arial" font-size="14" font-weight="400" fill="#334155">hybrid throttle supervisor, not a flight-ready</text>
<text x="1010" y="1041" font-family="Arial" font-size="14" font-weight="400" fill="#334155">six-DOF successive-convexification solver.</text>
</svg>
